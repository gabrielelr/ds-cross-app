name: Generate index

on:
  push:
    branches:
      - main
    paths:
      - 'components/**/metadata.json'
      - 'scripts/build_index.py'
      - 'skills/codebase-index/scripts/index_codebase.py'
      - '.github/workflows/generate-index.yml'
  workflow_dispatch:

jobs:
  generate-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Necessario per committare index.toon

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build index.toon
        run: python scripts/build_index.py

      - name: Commit index.toon if changed
        run: |
          git config user.name "DS Index Bot"
          git config user.email "bot@ds-index.noreply"
          if git diff --quiet index.toon; then
            echo "index.toon non è cambiato — nessun commit"
          else
            git add index.toon
            git commit -m "chore: rigenera index.toon"
            git push
          fi
